<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 520">

  <!-- Microphone -->
  <g fill="white" stroke="white" stroke-width="0">
    
    <!-- mic body -->
    <rect x="206" y="60" width="100" height="210" rx="50"></rect>

    <!-- grill -->
    <rect x="228" y="95" width="56" height="14" rx="7"></rect>
    <rect x="218" y="120" width="76" height="16" rx="8"></rect>
    <rect x="218" y="150" width="76" height="16" rx="8"></rect>
    <rect x="218" y="180" width="76" height="16" rx="8"></rect>
    <rect x="228" y="210" width="56" height="14" rx="7"></rect>

    <!-- side arms -->
    <path d="M150 220a106 106 0 0 0 212 0" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"></path>

    <!-- stand -->
    <rect x="244" y="300" width="24" height="60" rx="12"></rect>
    <rect x="190" y="360" width="132" height="28" rx="14"></rect>

  </g>

  <!-- Animated Cross -->
  <g stroke="#ff2b2b" stroke-width="30" stroke-linecap="round">

    <line x1="150" y1="120" x2="362" y2="332" stroke-dasharray="320" stroke-dashoffset="320">
      <animate attributeName="stroke-dashoffset" from="320" to="0" dur="0.45s" begin="0.15s" fill="freeze"></animate>
    </line>

    <line x1="362" y1="120" x2="150" y2="332" stroke-dasharray="320" stroke-dashoffset="320">
      <animate attributeName="stroke-dashoffset" from="320" to="0" dur="0.45s" begin="0.55s" fill="freeze"></animate>
    </line>

  </g>

  <!-- App name -->
  <text x="256" y="455" text-anchor="middle" fill="white" font-size="56" font-family="Arial, Helvetica, sans-serif" font-weight="bold">
    nektome
  </text>

</svg>